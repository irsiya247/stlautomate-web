<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STL Automate | AI-Powered Lead Automation for St. Louis</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    body {font-family: 'Inter', sans-serif; margin:0; background:#fbfdff; color:#0a1c2f; text-align:center;}
    .container {max-width:900px; margin:auto; padding:40px;}
    h1 {font-size:2.5rem;}
    .btn {background:#1e6f9f; color:#fff; padding:12px 24px; border-radius:30px; text-decoration:none; display:inline-block; margin-top:20px;}
    .form-box {background:#fff; padding:20px; border-radius:20px; max-width:500px; margin:40px auto;}
    input, textarea {width:100%; padding:10px; margin:8px 0; border-radius:10px; border:1px solid #ccc;}
  </style>
</head>
<body>
  <div class="container">
    <h1>Stop losing leads. Capture & qualify instantly.</h1>
    <p>AI automation for St. Louis businesses.</p>
    <a href="#form" class="btn">Book Free Audit</a>
  </div>

  <div id="form" class="form-box">
    <h2>Contact Us</h2>
    <form action="https://formspree.io/f/your-real-id" method="POST">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="tel" name="phone" placeholder="Phone">
      <textarea name="message" placeholder="Tell us about your leads"></textarea>
      <button class="btn" type="submit">Send</button>
    </form>
  </div>
</body>
</html>
