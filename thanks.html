<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Your Audit | STL Automate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="stylesheet" href="global.css">
</head>
<body class="antialiased bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=')] min-h-screen flex flex-col">
    
    <nav class="p-6 md:p-8 flex justify-between items-center max-w-6xl mx-auto w-full reveal">
        <a href="index.html" class="text-2xl font-extrabold tracking-tight">
            STL <span class="text-sky-500">Automate</span>
        </a>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-start px-6 pt-4 pb-12 w-full">
        
        <div class="max-w-2xl w-full text-center mb-8 reveal">
            <div class="inline-flex items-center gap-2 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-xs font-bold px-4 py-2 rounded-full mb-6">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                Intake Data Received
            </div>
            
            <h1 class="text-3xl md:text-4xl font-extrabold tracking-tighter mb-4 text-white">
                Step 2: <span class="accent-gradient">Secure Your Audit</span>
            </h1>
            
            <p class="text-base text-slate-400 leading-relaxed">
                Your data has been routed to our internal system. Choose a time below for your free 30-minute workflow walkthrough and ROI mapping session.
            </p>
        </div>
        
            <div id="calendly-embed" class="w-full" style="min-width:320px;height:700px;"></div>
<script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Grab the data passed from the intake form URL
        const urlParams = new URLSearchParams(window.location.search);
        const prefillName = urlParams.get('name') || '';
        const prefillEmail = urlParams.get('email') || '';
        const prefillBottleneck = urlParams.get('bottleneck') || ''; // Grabs the bottleneck text

        // Inject it directly into the calendar block
        Calendly.initInlineWidget({
            url: 'https://calendly.com/irsiya247/30min?hide_event_type_details=1&hide_gdpr_banner=1&background_color=0f172a&text_color=ffffff&primary_color=0ea5e9',
            parentElement: document.getElementById('calendly-embed'),
            prefill: {
                name: prefillName,
                email: prefillEmail,
                customAnswers: {
                    a1: prefillBottleneck // Maps the bottleneck text to Calendly's first custom question
                }
            }
        });
    });
</script>
        
        </div>

    </main>

    <script src="main.js"></script>
</body>
</html>
